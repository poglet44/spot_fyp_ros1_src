# ============================================================================
# Spot Frontier Executor
# ============================================================================
#
# Conservative path-following executor for Spot.
#
# Command route:
#   /frontier_path
#       -> spot_frontier_executor
#       -> /cmd_vel
#       -> twist_mux
#       -> /spot/cmd_vel
#       -> spot_ros
#       -> Boston Dynamics SDK
#
# Safety default:
#   enable_motion=false means this node computes/logs commands but does not
#   publish motion commands, except for manual stop zero commands.
#

# ---------------------------------------------------------------------------
# Topics
# ---------------------------------------------------------------------------

path_topic: /selected_exploration_path
goal_topic: /selected_exploration_goal
map_topic: /exploration_grid
cmd_vel_topic: /cmd_vel
status_topic: /spot_frontier_executor/status
motion_allowed_topic: /spot/status/motion_allowed

manual_stop_topic: /fyp/manual_stop
manual_locked_stop_topic: /fyp/manual_locked_stop

# ---------------------------------------------------------------------------
# Spot services
# ---------------------------------------------------------------------------

spot_stop_service: /spot/stop
spot_locked_stop_service: /spot/locked_stop

# ---------------------------------------------------------------------------
# Frames
# ---------------------------------------------------------------------------

global_frame: map
robot_frame: body

# ---------------------------------------------------------------------------
# Motion enable
# ---------------------------------------------------------------------------

enable_motion: true

# ---------------------------------------------------------------------------
# Control timing
# ---------------------------------------------------------------------------

control_rate_hz: 10.0
tf_lookup_timeout_s: 0.20
debug_log_period_s: 1.0

# ---------------------------------------------------------------------------
# Path following
# ---------------------------------------------------------------------------

lookahead_distance_m: 0.60
min_lookahead_distance_m: 0.35

goal_tolerance_m: 0.50
path_reached_tolerance_m: 0.30

max_path_age_s: 5.0
max_goal_age_s: 5.0
max_map_age_s: 2.0

max_distance_from_path_m: 0.75

rotate_to_heading_threshold_rad: 0.45

# ---------------------------------------------------------------------------
# Safety checking against exploration grid
# ---------------------------------------------------------------------------

occupied_threshold: 50
unknown_is_blocked: true
safety_check_radius_m: 0.10
check_path_to_lookahead: true

# ---------------------------------------------------------------------------
# Velocity command limits
# ---------------------------------------------------------------------------

max_linear_x_mps: 1.0
max_linear_y_mps: 0.0
max_angular_z_radps: 0.50

linear_gain: 0.75
angular_gain: 1.00

allow_reverse: false
allow_lateral_motion: false

# ---------------------------------------------------------------------------
# Stop behaviour
# ---------------------------------------------------------------------------

publish_zero_when_stopped: true
stop_when_no_path: true
stop_when_path_invalid: true

# Arbiter mode input.
# The executor stops immediately when mode is hold/no_valid_output.
selected_mode_topic: /selected_exploration_mode
require_selected_mode: true
selected_mode_timeout_s: 2.0
selected_mode_stop_values: [hold, no_valid_output]

# Arbiter mode input.
# Stops executor immediately during hold/no_valid_output.
selected_mode_topic: /selected_exploration_mode
require_selected_mode: true
selected_mode_timeout_s: 2.0
selected_mode_stop_values: [hold, no_valid_output]
