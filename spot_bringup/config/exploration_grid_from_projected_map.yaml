exploration_grid_from_projected_map:
  input_topic: /projected_map
  output_topic: /exploration_grid

  occupied_threshold: 50

  inflation_radius_m: 0.05
  gap_closing_radius_m: 0.15

  self_mask:
    enabled: true
    base_frame: body

    # Smaller tuned boxes.
    #
    # Body frame:
    #   x positive = forward
    #   y positive = left
    boxes:
      - name: front_left_handle
        x_min: 0.40
        x_max: 0.90
        y_min: 0.00
        y_max: 0.25

      - name: front_right_handle
        x_min: 0.40
        x_max: 0.90
        y_min: -0.25
        y_max: 0.00

      - name: spot_body_footprint
        x_min: -0.45
        x_max: 0.55
        y_min: -0.25
        y_max: 0.25
